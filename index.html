<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Physics Sandbox PWA</title>
    <!-- Carichiamo solo la libreria Matter.js principale -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            /* Blocca i gesti nativi del browser su qualsiasi elemento */
            touch-action: none; 
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f4f8;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            /* Forza la canvas a non subire lo scroll della pagina */
            touch-action: none; 
        }
        /* UI Overlay superiore */
        .toolbar {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            /* Permette i tocchi sui pulsanti della toolbar */
            touch-action: auto; 
        }
        button {
            border: none;
            background: #ffffff;
            color: #333;
            padding: 10px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: auto;
        }
        button:active {
            transform: scale(0.95);
        }
        button.active {
            background: #007bff;
            color: white;
        }
        .btn-danger {
            background: #ff3b30;
            color: white;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button id="modeBtn" class="active">Tipo: Dinamico</button>
        <button id="spawnBallBtn">Palla</button>
        <button id="undoBtn">Annulla</button>
        <button id="clearBtn" class="btn-danger">Reset</button>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Body } = Matter;

        const engine = Engine.create({ enableSleeping: false });
        const world = engine.world;
        world.gravity.y = 1.4; // Gravità leggermente aumentata per un feeling più reattivo

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: '#f0f4f8'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // --- LIMITI DEL MONDO ---
        const wallOptions = { isStatic: true, render: { fillStyle: '#2c3e50' } };
        const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 25, window.innerWidth * 2, 100, wallOptions);
        const leftWall = Bodies.rectangle(-25, window.innerHeight / 2, 50, window.innerHeight * 2, wallOptions);
        const rightWall = Bodies.rectangle(window.innerWidth + 25, window.innerHeight / 2, 50, window.innerHeight * 2, wallOptions);
        Composite.add(world, [ground, leftWall, rightWall]);

        // --- LOGICA DI GESTIONE TRACCIATO ---
        const canvas = render.canvas;
        const ctx = canvas.getContext('2d');
        
        let currentPoints = [];
        let isDrawing = false;
        let isStaticMode = false;
        let spawnedObjects = []; // Contiene i gruppi di linee o palle per l'Undo

        // UI Eventi
        const modeBtn = document.getElementById('modeBtn');
        modeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isStaticMode = !isStaticMode;
            modeBtn.textContent = isStaticMode ? "Tipo: Statico" : "Tipo: Dinamico";
            modeBtn.classList.toggle('active', !isStaticMode);
        });

        document.getElementById('clearBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            spawnedObjects.forEach(obj => Composite.remove(world, obj));
            spawnedObjects = [];
        });

        document.getElementById('undoBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            if (spawnedObjects.length > 0) {
                const lastObj = spawnedObjects.pop();
                Composite.remove(world, lastObj);
            }
        });

        document.getElementById('spawnBallBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            const ball = Bodies.circle(window.innerWidth / 2, 80, 24, {
                density: 0.01,
                restitution: 0.4,
                friction: 0.1,
                render: { fillStyle: '#e67e22' }
            });
            Composite.add(world, ball);
            spawnedObjects.push(ball);
        });

        // --- GESTIONE INPUT OTTIMIZZATA PER MOBILE ---
        function getPointerPos(e) {
            // Supporto nativo sia per touch che per mouse
            const clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
            return { x: clientX, y: clientY };
        }

        // Usiamo i PointerEvents standard, eccellenti su mobile
        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.toolbar')) return;
            isDrawing = true;
            const pos = getPointerPos(e);
            currentPoints = [pos];
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            
            const pos = getPointerPos(e);
            const lastPos = currentPoints[currentPoints.length - 1];
            
            // Calcola la distanza dall'ultimo punto registrato
            const dist = Math.hypot(pos.x - lastPos.x, pos.y - lastPos.y);
            // Salva il punto solo se ci si è mossi abbastanza (riduce i calcoli inutili)
            if (dist > 5) { 
                currentPoints.push(pos);
            }
        });

        window.addEventListener('pointerup', () => {
            if (!isDrawing) return;
            isDrawing = false;
            
            if (currentPoints.length > 1) {
                creaOggettoFisicoSegmentato(currentPoints);
            }
            currentPoints = [];
        });

        // --- CREAZIONE LINEA ROBUSTA A SEGMENTI CONCATENATI ---
        function creaOggettoFisicoSegmentato(punti) {
            const spessore = 10;
            const segmenti = [];

            // Opzioni estetiche e fisiche dei segmenti
            const opzioniFisiche = {
                isStatic: isStaticMode,
                density: 0.004,
                friction: 0.4,
                render: {
                    fillStyle: isStaticMode ? '#7f8c8d' : '#2ecc71',
                    strokeStyle: isStaticMode ? '#7f8c8d' : '#2ecc71'
                }
            };

            // Generiamo un rettangolo per ogni coppia di punti consecutivi
            for (let i = 0; i < punti.length - 1; i++) {
                const p1 = punti[i];
                const p2 = punti[i + 1];
                
                const centroX = (p1.x + p2.x) / 2;
                const centroY = (p1.y + p2.y) / 2;
                const lunghezza = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                const angolo = Math.atan2(p2.y - p1.y, p2.x - p1.x);

                const segmento = Bodies.rectangle(centroX, centroY, lunghezza, spessore, opzioniFisiche);
                Body.setAngle(segmento, angolo);
                segmenti.push(segmento);
            }

            // Se l'oggetto è dinamico, raggruppiamo i segmenti in un unico corpo rigido composto
            // in modo che cadano insieme e mantengano la forma del disegno
            if (segmenti.length > 0) {
                let corpoFinale;
                if (isStaticMode) {
                    // Per gli oggetti statici possiamo semplicemente aggiungerli al mondo singolarmente
                    corpoFinale = Body.create({ parts: segmenti, isStatic: true });
                } else {
                    // Per gli oggetti dinamici, formiamo un corpo composto unico
                    corpoFinale = Body.create({ parts: segmenti });
                }
                
                Composite.add(world, corpoFinale);
                spawnedObjects.push(corpoFinale);
            }
        }

        // --- DISEGNO DELLA LINEA GUIDA DURANTE IL TRASCINAMENTO ---
        Matter.Events.on(render, 'afterRender', () => {
            if (isDrawing && currentPoints.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = isStaticMode ? 'rgba(127, 140, 141, 0.7)' : 'rgba(46, 204, 113, 0.7)';
                ctx.lineWidth = 12;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.moveTo(currentPoints[0].x, currentPoints[0].y);
                for (let i = 1; i < currentPoints.length; i++) {
                    ctx.lineTo(currentPoints[i].x, currentPoints[i].y);
                }
                ctx.stroke();
            }
        });

        // Ridimensionamento dinamico dello schermo
        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
            Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + 25 });
            Body.setPosition(rightWall, { x: window.innerWidth + 25, y: window.innerHeight / 2 });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Physics Sandbox PWA</title>
    <!-- Carichiamo Matter.js e il plugin per decomporre i poligoni concavi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/poly-decomp@0.3.0/bezier.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/poly-decomp@0.3.0/build/decomp.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f4f8;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* UI Overlay superiore */
        .toolbar {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        button {
            border: none;
            background: #ffffff;
            color: #333;
            padding: 10px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button:active {
            transform: scale(0.95);
        }
        button.active {
            background: #007bff;
            color: white;
        }
        .btn-danger {
            background: #ff3b30;
            color: white;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button id="modeBtn" class="active">Tipo: Dinamico</button>
        <button id="spawnBallBtn">Palla</button>
        <button id="undoBtn">Annulla</button>
        <button id="clearBtn" class="btn-danger">Reset</button>
    </div>

    <script>
        // --- CONFIGURAZIONE MOTORE FISICO ---
        const { Engine, Render, Runner, Bodies, Composite, Vertices, Body } = Matter;
        
        // Forziamo poly-decomp globale per permettere a Matter.js di gestire forme geometriche complesse e concave
        window.decomp = decomp;

        const engine = Engine.create({
            enableSleeping: false
        });
        const world = engine.world;

        // Ottimizzazione gravità per il feeling alla "Brain It On"
        world.gravity.y = 1.2; 

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: '#f0f4f8',
                showVelocity: false
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // --- LIMITI DEL MONDO (Pavimento e Muri) ---
        const wallOptions = { isStatic: true, render: { fillStyle: '#2c3e50' } };
        const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 25, window.innerWidth * 2, 100, wallOptions);
        const leftWall = Bodies.rectangle(-25, window.innerHeight / 2, 50, window.innerHeight * 2, wallOptions);
        const rightWall = Bodies.rectangle(window.innerWidth + 25, window.innerHeight / 2, 50, window.innerHeight * 2, wallOptions);
        
        Composite.add(world, [ground, leftWall, rightWall]);

        // --- LOGICA DI GESTIONE TRACCIATO ---
        const canvas = render.canvas;
        const ctx = canvas.getContext('2d');
        
        let currentPoints = [];
        let isDrawing = false;
        let isStaticMode = false; // Controlla se l'oggetto disegnato fluttua o cade
        let spawnedObjects = [];  // Registro per la funzione Undo

        // Interruttori UI
        const modeBtn = document.getElementById('modeBtn');
        modeBtn.addEventListener('click', () => {
            isStaticMode = !isStaticMode;
            modeBtn.textContent = isStaticMode ? "Tipo: Statico" : "Tipo: Dinamico";
            modeBtn.classList.toggle('active', !isStaticMode);
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            spawnedObjects.forEach(obj => Composite.remove(world, obj));
            spawnedObjects = [];
        });

        document.getElementById('undoBtn').addEventListener('click', () => {
            if (spawnedObjects.length > 0) {
                const lastObj = spawnedObjects.pop();
                Composite.remove(world, lastObj);
            }
        });

        document.getElementById('spawnBallBtn').addEventListener('click', () => {
            const ball = Bodies.circle(window.innerWidth / 2, 100, 25, {
                density: 0.002,
                restitution: 0.6,
                render: { fillStyle: '#e67e22' }
            });
            Composite.add(world, ball);
            spawnedObjects.push(ball);
        });

        // --- EVENTI DI INPUT (Touch & Mouse completi) ---
        
        // Rileva le coordinate corrette rispetto alla canvas
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        window.addEventListener('pointerdown', (e) => {
            // Evita di disegnare se si clicca sulla barra dei pulsanti
            if (e.target.closest('.toolbar')) return;
            
            isDrawing = true;
            currentPoints = [getPointerPos(e)];
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            
            const pos = getPointerPos(e);
            const lastPos = currentPoints[currentPoints.length - 1];
            
            // Filtro di prossimità per non accumulare troppi punti identici vicini
            const dist = Math.hypot(pos.x - lastPos.x, pos.y - lastPos.y);
            if (dist > 8) { 
                currentPoints.push(pos);
            }
        });

        window.addEventListener('pointerup', () => {
            if (!isDrawing) return;
            isDrawing = false;
            
            if (currentPoints.length > 1) {
                creaOggettoFisicoDaTracciato(currentPoints);
            }
            currentPoints = [];
        });

        // --- CONVERSIONE LINEA -> CORPO RIGIDO ---
        function creaOggettoFisicoDaTracciato(punti) {
            // Spessore del tratto disegnato
            const spessore = 10; 
            const verticiTratto = [];

            // Generiamo un poligono che avvolge la linea simulando lo spessore dell'oggetto
            for (let i = 0; i < punti.length; i++) {
                const p = punti[i];
                let normalX = 0, normalY = 0;

                if (i < punti.length - 1) {
                    const next = punti[i + 1];
                    const dx = next.x - p.x;
                    const dy = next.y - p.y;
                    const len = Math.hypot(dx, dy);
                    normalX = -dy / len;
                    normalY = dx / len;
                } else {
                    const prev = punti[i - 1];
                    const dx = p.x - prev.x;
                    const dy = p.y - prev.y;
                    const len = Math.hypot(dx, dy);
                    normalX = -dy / len;
                    normalY = dx / len;
                }

                verticiTratto.push({ x: p.x + normalX * spessore, y: p.y + normalY * spessore });
                verticiTratto.unshift({ x: p.x - normalX * spessore, y: p.y - normalY * spessore });
            }

            // Creazione del corpo rigido (scompone automaticamente le parti concave)
            const corpo = Bodies.fromVertices(0, 0, verticiTratto, {
                isStatic: isStaticMode,
                density: 0.005,
                friction: 0.3,
                render: {
                    fillStyle: isStaticMode ? '#7f8c8d' : '#2ecc71',
                    strokeStyle: isStaticMode ? '#95a5a6' : '#27ae60',
                    lineWidth: 1
                }
            }, true);

            if (corpo) {
                // Calcola il baricentro corretto calcolato da Matter.js e sposta l'oggetto sul tracciato reale
                const centroGeometrico = Vertices.centre(verticiTratto);
                Body.setPosition(corpo, centroGeometrico);
                
                Composite.add(world, corpo);
                spawnedObjects.push(corpo);
            }
        }

        // --- RENDER IN TEMPO REALE DELLA LINEA GUIDA ---
        // Usiamo l'evento afterRender di Matter.js per sovrapporre il disegno mentre l'utente muove il dito
        Matter.Events.on(render, 'afterRender', () => {
            if (isDrawing && currentPoints.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = isStaticMode ? 'rgba(127, 140, 141, 0.7)' : 'rgba(46, 204, 113, 0.7)';
                ctx.lineWidth = 14;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.moveTo(currentPoints[0].x, currentPoints[0].y);
                for (let i = 1; i < currentPoints.length; i++) {
                    ctx.lineTo(currentPoints[i].x, currentPoints[i].y);
                }
                ctx.stroke();
            }
        });

        // Gestione ridimensionamento finestra/schermo smartphone
        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
            Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + 25 });
            Body.setPosition(rightWall, { x: window.innerWidth + 25, y: window.innerHeight / 2 });
        });
    </script>
</body>
</html>
